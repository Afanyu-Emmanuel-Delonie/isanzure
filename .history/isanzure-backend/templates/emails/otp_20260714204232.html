        <h2 style="color: #2D3748;">Hello, {{ name }}!</h2>

            <span style="font-size: 32px; font-weight: bold; letter-spacing: 5px; color: #4A90E2; background: #EDF2F7; padding: 10px 20px; border-radius: 5px;">
